name: Build Repo Explainer

on:
  workflow_dispatch:
    inputs:
      target_owner:
        description: GitHub owner of the repo to explain
        required: true
        type: string
      target_repo:
        description: GitHub repo name to explain
        required: true
        type: string
      build_id:
        description: UUID for tracking this build
        required: true
        type: string
      gist_id:
        description: GitHub Gist ID for status updates
        required: true
        type: string
      submitter_email:
        description: Email to notify when done
        required: false
        type: string

env:
  BUILD_ID: ${{ inputs.build_id }}
  GIST_ID: ${{ inputs.gist_id }}
  TARGET_OWNER: ${{ inputs.target_owner }}
  TARGET_REPO: ${{ inputs.target_repo }}
  EXPLAINER_REPO: stuinfla/${{ inputs.target_repo }}-explainer
  EXPLAINER_DOMAIN: ${{ inputs.target_repo }}.repoexplainer.isovision.ai
  GH_PAT: ${{ secrets.GH_PAT }}
  STARTED_AT: ""

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Record start time
        run: echo "STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      # ──────────────────────────────────────────────
      # Phase 0 — Setup
      # ──────────────────────────────────────────────
      - name: "Phase 0: Checkout Repo-Explainer"
        uses: actions/checkout@v4

      - name: "Phase 0: Setup Node.js 20"
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: "Phase 0: Install jq"
        run: sudo apt-get install -y jq

      - name: "Phase 0: Update gist — setup complete"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 0 9 "Setup" "running"

      # ──────────────────────────────────────────────
      # Phase 1 — Clone target repo
      # ──────────────────────────────────────────────
      - name: "Phase 1: Update gist — cloning target"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 1 9 "Cloning target repository" "running"

      - name: "Phase 1: Shallow clone target repo"
        run: |
          # Authenticated clone so private repos the token can access also work.
          # GH_PAT is a masked secret; the token never appears in logs.
          # Uses pre-validated env vars (not ${{ }} interpolation) to avoid
          # any shell-injection surface from the dispatch inputs.
          git clone --depth 1 \
            "https://x-access-token:${GH_PAT}@github.com/${TARGET_OWNER}/${TARGET_REPO}.git" \
            target-repo
          if [ ! -d "target-repo" ]; then
            echo "::error::Could not clone ${TARGET_OWNER}/${TARGET_REPO} — repo missing or token lacks access."
            exit 1
          fi
          echo "Target repo cloned successfully"
          ls -la target-repo/

      # ──────────────────────────────────────────────
      # Phase 2 — Build knowledge base
      # ──────────────────────────────────────────────
      - name: "Phase 2: Update gist — building KB"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 2 9 "Building knowledge base" "running"

      - name: "Phase 2: Build knowledge base"
        run: node scripts/phase2-build-kb.mjs target-repo/ kb-output/

      # ──────────────────────────────────────────────
      # Phase 3 — Scaffold explainer site
      # ──────────────────────────────────────────────
      - name: "Phase 3: Update gist — scaffolding site"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 3 9 "Scaffolding explainer site" "running"

      - name: "Phase 3: Scaffold site from template"
        run: node scripts/phase3-scaffold.mjs kb-output/repo-analysis.json explainer-site/

      # ──────────────────────────────────────────────
      # Phase 4 — Author content
      # ──────────────────────────────────────────────
      - name: "Phase 4: Update gist — authoring content"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 4 9 "Authoring explainer content" "running"

      - name: "Phase 4: Generate 9-section explainer content"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/phase4-author-content.mjs kb-output/repo-analysis.json explainer-site/

      # ──────────────────────────────────────────────
      # Phase 5 — Generate images
      # ──────────────────────────────────────────────
      - name: "Phase 5: Update gist — generating images"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 5 9 "Generating images" "running"

      - name: "Phase 5: Generate hero and section images"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/phase5-generate-images.mjs kb-output/repo-analysis.json explainer-site/

      # ──────────────────────────────────────────────
      # Phase 6 — Quality gates
      # ──────────────────────────────────────────────
      - name: "Phase 6: Update gist — running quality gates"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 6 9 "Running quality gates" "running"

      - name: "Phase 6: Run 5-gate quality system"
        run: node scripts/phase6-quality-gates.mjs explainer-site/ kb-output/repo-analysis.json

      # ──────────────────────────────────────────────
      # Phase 7 — Create GitHub repo and push
      # ──────────────────────────────────────────────
      - name: "Phase 7: Update gist — creating repo"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 7 9 "Creating GitHub repository" "running"

      - name: "Phase 7: Create repo and push explainer"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          # Create the public repo (or skip if it already exists)
          gh repo create "$EXPLAINER_REPO" --public --description \
            "Explainer site for ${{ inputs.target_owner }}/${{ inputs.target_repo }}" 2>/dev/null \
            || echo "Repo already exists, continuing"

          cd explainer-site
          git init
          git remote add origin "https://x-access-token:${GH_PAT}@github.com/${EXPLAINER_REPO}.git"
          git checkout -b main
          git add -A
          git -c user.name="Repo Explainer Bot" \
              -c user.email="bot@repo-explainer.dev" \
              commit -m "Initial explainer for ${{ inputs.target_owner }}/${{ inputs.target_repo }}"
          git push -u origin main --force

      - name: "Phase 7: Invite repo owner as collaborator"
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh api "repos/${EXPLAINER_REPO}/collaborators/${{ inputs.target_owner }}" \
            -X PUT -f permission=push \
            || echo "::warning::Could not invite ${{ inputs.target_owner }} as collaborator"

      # ──────────────────────────────────────────────
      # Phase 8 — Deploy to Vercel
      # ──────────────────────────────────────────────
      - name: "Phase 8: Update gist — deploying"
        run: ./scripts/update-gist-status.sh "$GIST_ID" 8 9 "Deploying to Vercel" "running"

      - name: "Phase 8: Deploy to Vercel"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm i -g vercel@latest

          cd explainer-site
          vercel pull --yes --environment=production --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true

          # Deploy. Capture stdout separately and DO NOT let a pipe mask the exit
          # code — the previous `| tail -1` swallowed failures and shipped an
          # error string as the URL.
          set +e
          DEPLOY_OUT=$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" 2>deploy.err)
          DEPLOY_RC=$?
          set -e

          DEPLOYMENT_URL=$(printf '%s\n' "$DEPLOY_OUT" | grep -Eo 'https://[a-zA-Z0-9._-]+\.vercel\.app' | tail -1)

          if [ "$DEPLOY_RC" -ne 0 ] || [ -z "$DEPLOYMENT_URL" ]; then
            echo "::error::Vercel deploy failed (exit $DEPLOY_RC, no deployment URL parsed)."
            echo "----- vercel stdout -----"; printf '%s\n' "$DEPLOY_OUT"
            echo "----- vercel stderr -----"; cat deploy.err 2>/dev/null || true
            exit 1
          fi
          echo "Deployed to: $DEPLOYMENT_URL"

          # Post-deploy smoke test: confirm the deployed site actually serves a
          # page to an unauthenticated visitor (catches protection/build issues).
          SMOKE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$DEPLOYMENT_URL")
          if [ "$SMOKE" = "200" ]; then
            echo "Smoke test OK — $DEPLOYMENT_URL returned 200 (public)."
          else
            echo "::warning::Smoke test — $DEPLOYMENT_URL returned HTTP $SMOKE (expected 200; check deployment protection)."
          fi

          # Best-effort alias to the custom domain. Assigning the alias is
          # harmless even before DNS is configured — it makes the subdomain go
          # live automatically the moment the Cloudflare CNAME exists.
          vercel alias set "$DEPLOYMENT_URL" "$EXPLAINER_DOMAIN" --token "$VERCEL_TOKEN" 2>alias.err \
            || { echo "::warning::Alias assignment failed:"; cat alias.err 2>/dev/null || true; }

          # Advertise the custom domain ONLY if it actually serves right now;
          # otherwise fall back to the deployment URL so the link always works.
          # This self-heals: once DNS resolves, future builds use the domain.
          if curl -fsS --max-time 12 -o /dev/null "https://$EXPLAINER_DOMAIN"; then
            LIVE_URL="https://$EXPLAINER_DOMAIN"
            echo "Custom domain is live: $LIVE_URL"
          else
            LIVE_URL="$DEPLOYMENT_URL"
            echo "::warning::Custom domain $EXPLAINER_DOMAIN not resolving yet (Cloudflare DNS pending) — advertising $DEPLOYMENT_URL"
          fi

          echo "DEPLOYMENT_URL=$DEPLOYMENT_URL" >> "$GITHUB_ENV"
          echo "LIVE_URL=$LIVE_URL" >> "$GITHUB_ENV"

      # ──────────────────────────────────────────────
      # Phase 9 — Notify
      # ──────────────────────────────────────────────
      - name: "Phase 9: Update gist — done"
        run: |
          RESULT=$(jq -n \
            --arg explainerUrl "${LIVE_URL:-https://$EXPLAINER_DOMAIN}" \
            --arg repoUrl "https://github.com/$EXPLAINER_REPO" \
            '{explainerUrl: $explainerUrl, repoUrl: $repoUrl}')

          PAYLOAD=$(jq -n \
            --arg buildId "$BUILD_ID" \
            --arg startedAt "$STARTED_AT" \
            --argjson result "$RESULT" \
            '{
              buildId: $buildId,
              step: 9,
              totalSteps: 9,
              stepName: "Complete",
              status: "done",
              startedAt: $startedAt,
              error: null,
              result: $result
            }')

          GIST_BODY=$(jq -n --arg content "$PAYLOAD" '{files: {"status.json": {content: $content}}}')

          curl -s -X PATCH \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -d "$GIST_BODY" \
            "https://api.github.com/gists/$GIST_ID"

      - name: "Phase 9: Send email notification"
        if: inputs.submitter_email != '' && env.HAS_GMAIL == 'true'
        env:
          HAS_GMAIL: ${{ secrets.GMAIL_APP_PASSWORD != '' }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ inputs.submitter_email }}
          EMAIL_SUBJECT: "Your explainer for ${{ inputs.target_owner }}/${{ inputs.target_repo }} is ready!"
        run: |
          SITE_URL="${LIVE_URL:-https://$EXPLAINER_DOMAIN}"
          EMAIL_HTML="<h2>Your Repo Explainer is ready</h2>"
          EMAIL_HTML="$EMAIL_HTML<p>Repository: <a href=\"https://github.com/$EXPLAINER_REPO\">$EXPLAINER_REPO</a></p>"
          EMAIL_HTML="$EMAIL_HTML<p>Live site: <a href=\"$SITE_URL\">$SITE_URL</a></p>"
          export EMAIL_HTML
          node scripts/phase9-send-email.mjs

      # ──────────────────────────────────────────────
      # Failure handler — update gist with error
      # ──────────────────────────────────────────────
      - name: "On failure: update gist with error"
        if: failure()
        run: |
          FAILED_STEP="${{ github.action }}"
          ./scripts/update-gist-status.sh \
            "$GIST_ID" 0 9 "$FAILED_STEP" "failed" \
            "Build failed at step: $FAILED_STEP. See workflow run for details."

