<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 460" width="920" height="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fbf6ee"/>
      <stop offset="1" stop-color="#f3ead9"/>
    </linearGradient>
    <linearGradient id="human" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4e2"/>
      <stop offset="1" stop-color="#ffe7c2"/>
    </linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7f6ed"/>
      <stop offset="1" stop-color="#cfeedd"/>
    </linearGradient>
  </defs>
  <rect width="920" height="460" rx="16" fill="url(#bg2)"/>
  <text x="460" y="42" text-anchor="middle" fill="#3b2f1e" font-size="22" font-weight="700">Two hero artifacts, one per repo</text>
  <text x="460" y="66" text-anchor="middle" fill="#7a6a52" font-size="13">A site that explains it to YOU &#8212; and a drop-in that makes YOUR AI expert on it.</text>

  <!-- Human half -->
  <rect x="48" y="100" width="380" height="300" rx="16" fill="url(#human)" stroke="#e0b878" stroke-width="2"/>
  <text x="238" y="140" text-anchor="middle" font-size="34">&#128104;&#8205;&#128187;</text>
  <text x="238" y="178" text-anchor="middle" fill="#8a5a1a" font-size="16" font-weight="700">The Explainer Website</text>
  <text x="238" y="200" text-anchor="middle" fill="#a07433" font-size="12.5">for a curious human</text>
  <line x1="84" y1="216" x2="392" y2="216" stroke="#e0b878" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="84" y="246" fill="#5f4a2c" font-size="12.5">&#9679; Captivating hero + plain-language pitch</text>
  <text x="84" y="272" fill="#5f4a2c" font-size="12.5">&#9679; The 7 questions, each its own section</text>
  <text x="84" y="298" fill="#5f4a2c" font-size="12.5">&#9679; A relatable before&#8594;after persona</text>
  <text x="84" y="324" fill="#5f4a2c" font-size="12.5">&#9679; A gallery of 5+ real use-cases</text>
  <text x="84" y="350" fill="#5f4a2c" font-size="12.5">&#9679; Friendly art + accurate diagrams</text>
  <text x="238" y="384" text-anchor="middle" fill="#8a5a1a" font-size="12" font-weight="600">&#8594; You finally "get it" and want to try it</text>

  <!-- AI half -->
  <rect x="492" y="100" width="380" height="300" rx="16" fill="url(#ai)" stroke="#7cc99c" stroke-width="2"/>
  <text x="682" y="140" text-anchor="middle" font-size="34">&#129302;</text>
  <text x="682" y="178" text-anchor="middle" fill="#1f7a4d" font-size="16" font-weight="700">The Drop-in Smart Zip</text>
  <text x="682" y="200" text-anchor="middle" fill="#2f8a5d" font-size="12.5">for your AI coding assistant</text>
  <line x1="528" y1="216" x2="836" y2="216" stroke="#7cc99c" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="528" y="246" fill="#1f5a3a" font-size="12.5">&#9679; Single-file RVF / HNSW vector KB</text>
  <text x="528" y="272" fill="#1f5a3a" font-size="12.5">&#9679; ask-kb CLI + MCP server</text>
  <text x="528" y="298" fill="#1f5a3a" font-size="12.5">&#9679; All passages, fully searchable</text>
  <text x="528" y="324" fill="#1f5a3a" font-size="12.5">&#9679; NotebookLM studio: audio + report</text>
  <text x="528" y="350" fill="#1f5a3a" font-size="12.5">&#9679; Unzip &#8594; .mcp.json &#8594; ask in plain English</text>
  <text x="682" y="384" text-anchor="middle" fill="#1f7a4d" font-size="12" font-weight="600">&#8594; Your AI answers from the real source</text>
</svg>
