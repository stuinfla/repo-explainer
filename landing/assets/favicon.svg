<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Repo Explainer — a spectrum aperture that turns code into clarity">
  <!-- Mark: a dark tile holding a full-spectrum aperture (the "lens" that makes
       a repo legible) with a bright forward-play triangle at its heart — the
       page you forward. Built from the brand spectrum, none of the six examples. -->
  <defs>
    <linearGradient id="re-spec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#a06bff"/>
      <stop offset="30%" stop-color="#4f8cff"/>
      <stop offset="52%" stop-color="#1fd6d6"/>
      <stop offset="72%" stop-color="#3ee68a"/>
      <stop offset="100%" stop-color="#ff6f9c"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="#0c0d14"/>
  <!-- aperture ring -->
  <circle cx="16" cy="16" r="9.5" fill="none" stroke="url(#re-spec)" stroke-width="2.4"/>
  <!-- inner aperture fill, faint -->
  <circle cx="16" cy="16" r="6.4" fill="url(#re-spec)" opacity="0.16"/>
  <!-- forward-play triangle (the page you forward) -->
  <path d="M13.4 11.6 L21 16 L13.4 20.4 Z" fill="#eff1fc"/>
</svg>
