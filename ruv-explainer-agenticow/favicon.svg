<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="br" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b8cff"/>
      <stop offset="55%" stop-color="#2fd6c6"/>
      <stop offset="100%" stop-color="#34e8a0"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="13" fill="#08120e"/>
  <!-- branch lines: one base node (violet) forking into children (mint) -->
  <g fill="none" stroke="url(#br)" stroke-width="2.6" stroke-linecap="round">
    <path d="M14 44 C 26 44 26 20 40 20"/>
    <path d="M14 44 C 26 44 28 44 44 44"/>
    <path d="M28 38 C 36 38 38 30 48 30"/>
  </g>
  <!-- base node -->
  <circle cx="14" cy="44" r="5.4" fill="#9b8cff"/>
  <!-- child branch nodes -->
  <circle cx="40" cy="20" r="4.4" fill="#34e8a0"/>
  <circle cx="44" cy="44" r="4.4" fill="#34e8a0"/>
  <circle cx="48" cy="30" r="3.6" fill="#5cf2b6"/>
  <!-- one discarded branch tip (coral) -->
  <circle cx="50" cy="50" r="2.8" fill="#ff6b8a" opacity="0.85"/>
</svg>
